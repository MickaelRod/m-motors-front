<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Motors - Espace client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">M-MOTORS</a>
            <div class="ms-auto d-flex align-items-center">
                <span id="nom-utilisateur" class="text-light me-3 small">Chargement du profil...</span>
                <button id="bouton-deconnexion" class="btn btn-outline-danger btn-sm px-3">Se déconnecter</button>
            </div>
        </div>
    </nav>

    <main class="container py-5" style="max-width: 1000px;">
        <div class="mb-5">
            <h1 class="fw-bold">Espace client</h1>
            <p class="text-muted">Retrouvez l'état d'avancement de vos dossiers de financement et de location dématérialisés</p>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <h4 class="card-title fw-bold mb-4">Mes dossiers en cours</h4>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="small fw-bold text-uppercase">Date</th>
                                <th scope="col" class="small fw-bold text-uppercase">Type de demande</th>
                                <th scope="col" class="small fw-bold text-uppercase">Véhicule</th>
                                <th scope="col" class="small fw-bold text-uppercase">Statut</th>
                            </tr>
                        </thead>
                        <tbody id="liste-demandes">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">Aucune demande enregistrée pour le moment.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/espaceclient.js?v=1.2"></script>
</body>
</html>
