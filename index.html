<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Motors - Catalogue des véhicules</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">M-Motors</h1>
            <p class="lead text-muted">Trouvez le véhicule adapté à vos besoins</p>
        </header>

        <div class="d-flex justify-content-center gap-3 mb-4">
            <button class="btn btn-outline-primary active" id="btn-tous" onclick="filtrerCatalogue('')">Tous nos véhicules</button>
            <button class="btn btn-outline-primary" id="btn-achat" onclick="filtrerCatalogue('achat')">Options d'achat</button>
            <button class="btn btn-outline-primary" id="btn-location" onclick="filtrerCatalogue('location')">Options de location (LLD)</button>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="zone-catalogue">
            </div>
    </div>

    <script src="js/catalogue.js"></script>
</body>
</html>
