<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Motors - Espace Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">M-MOTORS</a>
            <div class="ms-auto">
                <a class="btn btn-outline-light btn-sm px-3" href="index.html">Retour au catalogue</a>
            </div>
        </div>
    </nav>

    <main class="container py-5" style="max-width: 1000px;">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Espace client</h1>
            <p class="text-muted">Connectez-vous ou créez un compte pour gérer et suivre vos demandes de financement.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="card h-100 shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="card-title fw-bold mb-4">Connexion</h3>
                        
                        <form id="formulaire-connexion">
                            <div class="mb-3">
                                <label for="conn-email" class="form-label small fw-bold">Adresse e-mail</label>
                                <input type="email" class="form-control" id="conn-email" required placeholder="exemple@email.com">
                            </div>
                            
                            <div class="mb-4">
                                <label for="conn-mot-de-passe" class="form-label small fw-bold">Mot de passe</label>
                                <input type="password" class="form-control" id="conn-mot-de-passe" required placeholder="********" autocomplete="current-password">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                        </form>
                        
                        <div id="connexion-reponse" class="mt-4 alert d-none" role="alert"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-1 d-none d-md-flex align-items-center justify-content-center">
                <div class="vr h-100"></div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="card-title fw-bold mb-4">Inscription</h3>
                        
                        <form id="formulaire-inscription" class="row g-3">
                            <div class="col-12">
                                <label for="insc-nom" class="form-label small fw-bold">Nom complet</label>
                                <input type="text" class="form-control" id="insc-nom" required placeholder="Jean Dupont">
                            </div>
                            
                            <div class="col-12">
                                <label for="insc-email" class="form-label small fw-bold">Adresse e-mail</label>
                                <input type="email" class="form-control" id="insc-email" required placeholder="jean.dupont@email.com">
                            </div>

                            <div class="col-12">
                                <label for="insc-telephone" class="form-label small fw-bold">Numéro de téléphone</label>
                                <input type="tel" class="form-control" id="insc-telephone" required placeholder="+33 6 12 34 56 78" pattern="^\+?[0-9\s\-]{8,20}$" title="Le numéro de téléphone doit contenir uniquement des chiffres, des espaces, des tirets ou commencer par un + et contenir au moins 8 caractères">
                            </div>

                            <div class="col-12">
                                <label for="insc-mot-de-passe" class="form-label small fw-bold">Mot de passe</label>
                                <input type="password" class="form-control" id="insc-mot-de-passe" required placeholder="********" minlength="8" title="Le mot de passe doit contenir au moins 8 caractères" autocomplete="new-password">                                
                                <div class="form-text xsmall">Sécurité minimale : 8 caractères requis.</div>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-success w-100">Créer mon compte client</button>
                            </div>
                        </form>

                        <div id="inscription-reponse" class="mt-4 alert d-none" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/connexion.js?v=1.0"></script>
</body>
</html>
